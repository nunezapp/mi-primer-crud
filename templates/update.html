<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Tarea</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
        .campo { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn-actualizar { background: #ffc107; color: black; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Editar Tarea</h1>
    <form method="POST">
        <div class="campo">
            <label for="titulo">Título de la tarea:</label>
            <input type="text" name="titulo" value="{{ tarea['titulo'] }}" required>
        </div>
        <div class="campo">
            <label for="descripcion">Descripción:</label>
            <textarea name="descripcion" rows="4">{{ tarea['descripcion'] }}</textarea>
        </div>
        <button type="submit" class="btn-actualizar">Actualizar Tarea</button>
    </form>
    <br>
    <a href="{{ url_for('index') }}">Volver al listado</a>
</body>
</html>
