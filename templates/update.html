<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Tarea</title>
    <link href="https://jsdelivr.net" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-4" style="max-width: 600px;">
        <h1 class="h3 mb-4 text-warning fw-bold">Editar Tarea</h1>
        
        <div class="card shadow-sm p-4 bg-white border-0 rounded-3">
            <form method="POST">
                <div class="mb-3">
                    <label for="titulo" class="form-label fw-bold">Título de la tarea:</label>
                    <input type="text" name="titulo" class="form-control" value="{{ tarea['titulo'] }}" required>
                </div>
                <div class="mb-3">
                    <label for="descripcion" class="form-label fw-bold">Descripción:</label>
                    <textarea name="descripcion" class="form-control" rows="4">{{ tarea['descripcion'] }}</textarea>
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-warning fw-bold p-2">Actualizar Tarea</button>
                </div>
            </form>
        </div>
        <br>
        <a href="{{ url_for('index') }}" class="text-decoration-none text-secondary">← Volver al listado</a>
    </div>
</body>
</html>
