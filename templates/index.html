<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Primer CRUD</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f4f6f9; color: #333; padding: 20px; }
        .container { max-width: 500px; margin: 20px auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        h1 { font-size: 24px; color: #111; }
        .btn { display: inline-block; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 14px; text-align: center; border: none; cursor: pointer; }
        .btn-primary { background-color: #0076ff; color: white; }
        .btn-warning { background-color: #ffcc00; color: #111; }
        .btn-danger { background-color: #ff3b30; color: white; }
        .list-group { margin-top: 15px; }
        .tarea-item { background: #fff; border: 1px solid #eaeaea; padding: 15px; border-radius: 8px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .tarea-content { max-width: 65%; word-wrap: break-word; }
        .tarea-titulo { font-weight: 600; font-size: 16px; margin-bottom: 4px; }
        .tarea-desc { font-size: 14px; color: #666; }
        .acciones { display: flex; gap: 8px; }
        .vacio { text-align: center; color: #999; padding: 20px; font-size: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Mis Tareas</h1>
            <a href="{{ url_for('create') }}" class="btn btn-primary">+ Nueva</a>
        </div>
        
        <div class="list-group">
            {% for tarea in tareas %}
                <div class="tarea-item">
                    <div class="tarea-content">
                        <div class="tarea-titulo">{{ tarea.titulo }}</div>
                        <div class="tarea-desc">{{ tarea.descripcion }}</div>
                    </div>
                    <div class="acciones">
                        <a href="{{ url_for('update', id=tarea.id) }}" class="btn btn-warning" style="padding: 6px 12px; font-size: 13px;">Editar</a>
                        <form action="{{ url_for('delete', id=tarea.id) }}" method="POST" style="margin:0;">
                            <button type="submit" class="btn btn-danger" style="padding: 6px 12px; font-size: 13px;">Borrar</button>
                        </form>
                    </div>
                </div>
            {% else %}
                <p class="vacio">No hay tareas pendientes.</p>
            {% endfor %}
        </div>
    </div>
</body>
</html>
