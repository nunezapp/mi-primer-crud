<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Tarea</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: #f4f6f9; padding: 20px; }
        .container { max-width: 500px; margin: 20px auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h1 { font-size: 22px; margin-bottom: 20px; color: #34c759; }
        .campo { margin-bottom: 18px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; outline: none; }
        input:focus, textarea:focus { border-color: #34c759; }
        .btn-submit { width: 100%; padding: 12px; border-radius: 8px; background-color: #34c759; color: white; border: none; font-weight: bold; font-size: 15px; cursor: pointer; }
        .volver { display: inline-block; margin-top: 15px; color: #666; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Nueva Tarea</h1>
        <form method="POST">
            <div class="campo">
                <label>Título de la tarea:</label>
                <input type="text" name="titulo" required placeholder="Ej: Estudiar Python">
            </div>
            <div class="campo">
                <label>Descripción:</label>
                <textarea name="descripcion" rows="4" placeholder="Detalles de la tarea..."></textarea>
            </div>
            <button type="submit" class="btn-submit">Guardar Tarea</button>
        </form>
        <a href="{{ url_for('index') }}" class="volver">← Volver al listado</a>
    </div>
</body>
</html>
